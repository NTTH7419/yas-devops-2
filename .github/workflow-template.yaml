name: {{SERVICE_NAME}} service ci

on:
  push:
    branches: [ "**" ]
    paths:
      - "{{SERVICE_NAME}}/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/{{SERVICE_NAME}}-ci.yaml"
      - "pom.xml"
      - ".snyk"
  pull_request:
    branches: [ "**" ]
    paths:
      - "{{SERVICE_NAME}}/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/{{SERVICE_NAME}}-ci.yaml"
      - "pom.xml"
      - ".snyk"
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Verify (Test + Coverage)
        run: mvn verify -pl {{SERVICE_NAME}} -am
      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl {{SERVICE_NAME}} -am -Dcheckstyle.output.file={{SERVICE_NAME}}-checkstyle-result.xml
      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/{{SERVICE_NAME}}-checkstyle-result.xml"
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
      - name: Snyk - Dependency Scan
        run: >
          snyk test
          --maven-aggregate-project
          --org=${{ vars.SNYK_ORG }}
          --severity-threshold=high
      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl {{SERVICE_NAME}} -am
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ success() || failure() }}
        with:
          name: {{SERVICE_NAME}}-Service-Unit-Test-Results
          path: "{{SERVICE_NAME}}/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/{{SERVICE_NAME}}/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "{{SERVICE_NAME}} Coverage Report"
          update-comment: true

  Build:
    needs: Test
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean package -DskipTests -pl {{SERVICE_NAME}} -am
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./{{SERVICE_NAME}}
          push: false
          load: true
          tags: ghcr.io/nashtech-garage/yas-{{SERVICE_NAME}}:latest
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Snyk - Container Scan
        if: ${{ github.ref == 'refs/heads/main' }}
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >
          snyk container test ghcr.io/nashtech-garage/yas-{{SERVICE_NAME}}:latest 
          --file={{SERVICE_NAME}}/Dockerfile 
          --org=ntth7419 
          --project-name="yas/{{SERVICE_NAME}}-container" 
          --severity-threshold=high
      - name: Push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        run: docker push ghcr.io/nashtech-garage/yas-{{SERVICE_NAME}}:latest
