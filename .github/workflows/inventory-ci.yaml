name: inventory service ci

on:
  push:
    branches: ["**"]
    paths:
      - "inventory/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/inventory-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean package -DskipTests -pl inventory -am
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Determine Docker Tags
        id: tags
        run: |
          REPO="ngoctuan74/yas-inventory"
          COMMIT_ID="${GITHUB_SHA::7}"
          
          DOCKER_TAGS="$REPO:$COMMIT_ID"
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            DOCKER_TAGS="$DOCKER_TAGS,$REPO:latest,$REPO:main"
          fi
          
          echo "docker_tags=$DOCKER_TAGS" >> $GITHUB_OUTPUT
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./inventory
          push: true
          tags: ${{ steps.tags.outputs.docker_tags }}
