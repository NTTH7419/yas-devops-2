name: inventory service ci

on:
  push:
    branches: ["**"]
    paths:
      - "inventory/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/inventory-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["**"]
    paths:
      - "inventory/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/inventory-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Test Command
        run: mvn test -pl inventory -am
      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl inventory -am -Dcheckstyle.output.file=inventory-checkstyle-result.xml
      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/inventory-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ success() || failure() }}
        with:
          name: Inventory-Service-Test-Results
          path: "inventory/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/inventory/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Inventory Coverage Report'
          update-comment: true

  Build:
    needs: Test
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean package -DskipTests -pl inventory -am
      - name: Snyk - Dependency Scan
        uses: snyk/actions/maven@9adf32b1121593767fc3c057af55b55db032dc04
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      - name: Analyze with sonar cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f inventory
      # - name: Log in to the Container registry
