name: cleanup_dev_deployment

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Set up Kubeconfig
      #   run: |
      #     mkdir -p ~/.kube
      #     echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Uninstall Helm Releases
        env:
          KUBECONFIG: /opt/devops/.kube/config
        run: |
          SERVICES=("backoffice-bff" "backoffice-ui" "cart" "customer" "inventory" "media" "order" "product" "search" "storefront-bff" "storefront-ui" "tax" "swagger-ui")
          
          echo "🧹 Starting cleanup of sandbox environment in namespace 'yas'..."
          
          for SVC in "${SERVICES[@]}"; do
            if helm status yas-$SVC -n yas > /dev/null 2>&1; then
              echo "🗑️ Uninstalling yas-$SVC..."
              helm uninstall yas-$SVC -n yas
            fi
          done
          
          echo "✅ Sandbox cleanup completed successfully."
