name: cleanup_dev_deployment

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cleanup Sandbox Environment
        env:
          KUBECONFIG: /opt/devops/.kube/config
        run: |
          echo "================================================================="
          echo "🧹 BẮT ĐẦU DỌN DẸP MÔI TRƯỜNG SANDBOX CỦA DEVELOPER..."
          echo "================================================================="
          
          # 1. Gỡ cài đặt tất cả các Helm release trong namespace yas một cách động
          echo "🗑️ Đang rà soát và gỡ cài đặt các Helm release..."
          RELEASES=$(helm list -n yas -q 2>/dev/null || echo "")
          if [ -n "$RELEASES" ]; then
            for REL in $RELEASES; do
              echo "🗑️ Gỡ cài đặt Helm release: $REL..."
              helm uninstall "$REL" -n yas --wait || true
            done
          else
            echo "ℹ️ Không tìm thấy Helm release nào đang chạy."
          fi
          
          # 2. Xóa namespace yas để dọn dẹp triệt để các tài nguyên khác (PVC, Secrets, ConfigMaps)
          echo "🗑️ Đang xóa namespace 'yas'..."
          kubectl delete namespace yas --ignore-not-found=true --wait=true
          
          # 3. Dọn dẹp các tiến trình socat port-forwarding trên VM (Chỉ kill các port 3xxxx, chừa lại port 80 của Ingress)
          echo "🧹 Đang dọn dẹp các tiến trình socat port-forwarding..."
          WORKER_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "192.168.49.2")
          pkill -f "socat TCP-LISTEN:3[0-9][0-9][0-9][0-9],.*TCP:$WORKER_IP" || true
          
          echo "================================================================="
          echo "✅ ĐÃ DỌN DẸP VÀ GIẢI PHÓNG HOÀN TOÀN TÀI NGUYÊN SANDBOX!"
          echo "================================================================="
          
          # [TỐI ƯU HÓA TÀI NGUYÊN]: Khôi phục lại môi trường dev
          echo "🔥 Đang 'đánh thức' lại môi trường dev (scale=1)..."
          kubectl scale deploy -n dev --all --replicas=1
