name: cleanup_dev_deployment

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Set up Kubeconfig
      #   run: |
      #     mkdir -p ~/.kube
      #     echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Uninstall Helm Releases
        env:
          KUBECONFIG: /opt/devops/.kube/config
        run: |
          echo "🧹 Starting nuclear cleanup of sandbox environment: deleting entire namespace 'yas'..."
          kubectl delete namespace yas --ignore-not-found=true --wait=true
          
          echo "✅ Sandbox environment in namespace 'yas' has been completely destroyed and cleaned up."
