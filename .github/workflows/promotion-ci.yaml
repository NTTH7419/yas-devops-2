name: promotion service ci

on:
  push:
    branches: ["**"]
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["**"]
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Verify (Test + Coverage)
        run: mvn verify -DskipITs -pl promotion -am
      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl promotion -am -Dcheckstyle.output.file=promotion-checkstyle-result.xml
      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/promotion-checkstyle-result.xml"
      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl promotion -am
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ success() || failure() }}
        with:
          name: Promotion-Service-Unit-Test-Results
          path: "promotion/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/promotion/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Promotion Coverage Report"
          update-comment: true

  Build:
    needs: Test
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean package -DskipTests -pl promotion -am
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Determine Docker Tags
        id: tags
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/yas-promotion"
          COMMIT_ID="${{ github.sha }}"
          
          DOCKER_TAGS="$REPO:$COMMIT_ID"
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            DOCKER_TAGS="$DOCKER_TAGS,$REPO:latest,$REPO:main"
          fi
          
          echo "docker_tags=$DOCKER_TAGS" >> $GITHUB_OUTPUT
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./promotion
          push: true
          tags: ${{ steps.tags.outputs.docker_tags }}