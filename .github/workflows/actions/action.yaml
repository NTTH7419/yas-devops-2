name: "Setup Java Build Environment"
description: "Sets up JDK 21 and caches SonarCloud and Maven packages for CI workflows"

runs:
  using: "composite"
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    - name: Install Common Library
      shell: bash
      run: mvn install -DskipTests -pl common-library -am