name: storefront-bff service ci

on:
  push:
    branches: ["**"]
    paths:
      - "storefront-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-bff-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["**"]
    paths:
      - "storefront-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-bff-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean package -DskipTests -pl storefront-bff -am
      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl storefront-bff -am

  Build:
    needs: Test
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Maven Build
        run: mvn clean package -DskipTests -pl storefront-bff -am
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Determine Docker Tags
        id: tags
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront-bff"
          COMMIT_ID="${{ github.sha }}"
          
          DOCKER_TAGS="$REPO:$COMMIT_ID"
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            DOCKER_TAGS="$DOCKER_TAGS,$REPO:latest,$REPO:main"
          fi
          
          echo "docker_tags=$DOCKER_TAGS" >> $GITHUB_OUTPUT
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./storefront-bff
          push: true
          tags: ${{ steps.tags.outputs.docker_tags }}