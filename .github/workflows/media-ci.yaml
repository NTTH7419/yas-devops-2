name: media service ci

on:
  push:
    branches: ["**"]
    tags: [ "v*" ]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean package -DskipTests -pl media -am
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine Docker Tags
        id: tags
        run: |
          REPO="ghcr.io/NTTH7419/yas-media"
          COMMIT_ID="${GITHUB_SHA::7}"
          
          DOCKER_TAGS="$REPO:$COMMIT_ID"
          
          # Nếu là release tag (v1.2.3)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            DOCKER_TAGS="$DOCKER_TAGS,$REPO:$TAG_NAME"
          fi

          
          # Nếu push lên branch main
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            DOCKER_TAGS="$DOCKER_TAGS,$REPO:latest,$REPO:main"
          fi
          
          echo "docker_tags=$DOCKER_TAGS" >> $GITHUB_OUTPUT
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./media
          push: true
          tags: ${{ steps.tags.outputs.docker_tags }}
