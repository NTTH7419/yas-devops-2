name: backoffice service ci

on:
  push:
    branches: ["**"]
    tags: [ "v*" ]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
        working-directory: backoffice
      - run: npm run build
        working-directory: backoffice
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Determine Docker Tags
        id: tags
        run: |
          REPO="ngoctuan74/yas-backoffice"
          COMMIT_ID="${GITHUB_SHA::7}"
          
          DOCKER_TAGS="$REPO:$COMMIT_ID"
          
          # Nếu là release tag (v1.2.3)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            DOCKER_TAGS="$DOCKER_TAGS,$REPO:$TAG_NAME"
          fi

          
          # Nếu push lên branch main
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            DOCKER_TAGS="$DOCKER_TAGS,$REPO:latest,$REPO:main"
          fi
          
          echo "docker_tags=$DOCKER_TAGS" >> $GITHUB_OUTPUT
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          push: true
          tags: ${{ steps.tags.outputs.docker_tags }}

  trigger_webhook:
    needs: Build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Trigger ArgoCD Image Updater Webhook
        run: |
          curl -v -X POST http://webhook.yas.local.com/api/webhook \
            -H "X-Docker-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repository": {
                "repo_name": "ngoctuan74/yas-backoffice" 
              }
            }'
