name: payment service ci

on:
  push:
    branches: ["**"]
    paths:
      - "payment/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/payment-ci.yaml"
      - "pom.xml"
      - ".snyk"
  pull_request:
    branches: ["**"]
    paths:
      - "payment/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/payment-ci.yaml"
      - "pom.xml"
      - ".snyk"
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Install payment-paypal
        run: mvn install -DskipTests -pl payment-paypal -am
      - name: Run Maven Verify (Test + Coverage)
        run: mvn verify -DskipITs -pl payment -am
      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl payment -am -Dcheckstyle.output.file=payment-checkstyle-result.xml
      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/payment-checkstyle-result.xml'
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
      - name: Snyk - Dependency Scan
        run: >
          snyk test
          --maven-aggregate-project
          --org=${{ vars.SNYK_ORG }}
          --severity-threshold=high
      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl payment -am
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ success() || failure() }}
        with:
          name: Payment-Service-Unit-Test-Results
          path: "payment/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/payment/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Payment Coverage Report"
          update-comment: true

  Build:
    needs: Test
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Install payment-paypal
        run: mvn install -DskipTests -pl payment-paypal -am
      - name: Run Maven Build Command
        run: mvn clean package -DskipTests -pl payment -am
