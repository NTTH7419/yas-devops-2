name: developer_build

on:
  workflow_dispatch:
    inputs:
      backoffice:
        description: 'Branch for backoffice'
        required: true
        default: 'main'
      backoffice_bff:
        description: 'Branch for backoffice-bff'
        required: true
        default: 'main'
      cart:
        description: 'Branch for cart'
        required: true
        default: 'main'
      customer:
        description: 'Branch for customer'
        required: true
        default: 'main'
      inventory:
        description: 'Branch for inventory'
        required: true
        default: 'main'
      media:
        description: 'Branch for media'
        required: true
        default: 'main'
      order:
        description: 'Branch for order'
        required: true
        default: 'main'
      product:
        description: 'Branch for product'
        required: true
        default: 'main'
      search:
        description: 'Branch for search'
        required: true
        default: 'main'
      storefront:
        description: 'Branch for storefront'
        required: true
        default: 'main'
      storefront_bff:
        description: 'Branch for storefront-bff'
        required: true
        default: 'main'
      tax:
        description: 'Branch for tax'
        required: true
        default: 'main'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.build_step.outputs.tags }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Modified Services
        id: build_step
        env:
          INPUTS_JSON: ${{ toJson(github.event.inputs) }}
        run: |
          echo "$INPUTS_JSON" > inputs.json
          
          SERVICES=("backoffice" "backoffice-bff" "cart" "customer" "inventory" "media" "order" "product" "search" "storefront" "storefront-bff" "tax")
          
          # Khởi tạo chuỗi chứa các tag để truyền sang job deploy
          TAGS_OUTPUT=""

          for SVC in "${SERVICES[@]}"; do
            KEY=$(echo $SVC | sed 's/-/_/g')
            BRANCH=$(jq -r ".$KEY" inputs.json)
            
            if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "null" ] && [ "$BRANCH" != "" ]; then
              echo "🚀 Processing service: $SVC on branch: $BRANCH"
              git checkout $BRANCH
              
              COMMIT_ID=$(git rev-parse --short HEAD)
              REPO="${{ secrets.DOCKERHUB_USERNAME }}/yas-$SVC"
              
              if [ -f "$SVC/pom.xml" ]; then
                mvn clean package -DskipTests -pl $SVC -am
              elif [ -f "$SVC/package.json" ]; then
                cd $SVC && npm install && npm run build && cd ..
              fi
              
              docker build -t $REPO:$COMMIT_ID ./$SVC
              docker push $REPO:$COMMIT_ID
              
              TAGS_OUTPUT="${TAGS_OUTPUT}${SVC}=${COMMIT_ID},"
              git checkout main
            fi
          done
          echo "tags=$TAGS_OUTPUT" >> $GITHUB_OUTPUT

  deploy:
    needs: build_and_push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Set up Kubeconfig
      #   run: |
      #     mkdir -p ~/.kube
      #     echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Cleanup Previous Sandbox Deployment
        env:
          KUBECONFIG: /opt/devops/.kube/config
        run: |
          # Danh sách tên release HIỆN TẠI
          CHARTS=("backoffice-bff" "backoffice-ui" "cart" "customer" "inventory" "media" "order" "product" "search" "storefront-ui" "storefront-bff" "tax" "swagger-ui")
          # Danh sách tên release CŨ (từ các lần chạy trước với code cũ dùng $SVC_INPUT)
          OLD_RELEASES=("backoffice" "storefront" "storefront-bff")
          
          echo "🧹 Cleaning up previous sandbox releases before fresh install..."
          for CHART in "${CHARTS[@]}"; do
            if helm status yas-$CHART -n yas > /dev/null 2>&1; then
              echo "🗑️ Uninstalling existing release yas-$CHART..."
              helm uninstall yas-$CHART -n yas --wait
            fi
          done
          
          echo "🧹 Cleaning up legacy release names..."
          for OLD in "${OLD_RELEASES[@]}"; do
            if helm status yas-$OLD -n yas > /dev/null 2>&1; then
              echo "🗑️ Uninstalling legacy release yas-$OLD..."
              helm uninstall yas-$OLD -n yas --wait
            fi
          done
          
          # Xóa triệt để mọi Deployment/Service còn sót lại không do Helm quản lý
          echo "🗑️ Removing any orphaned resources in namespace 'yas'..."
          kubectl delete deployment --all -n yas --ignore-not-found=true --wait=true
          kubectl delete svc --all -n yas --ignore-not-found=true --wait=true
          
          # Chờ K8s hoàn tất dọn dẹp
          echo "⏳ Waiting for all resources to be fully terminated..."
          sleep 10
          
          echo "✅ Pre-deploy cleanup completed."

      - name: Deploy Services via Direct Helm
        env:
          TAGS: ${{ needs.build_and_push.outputs.tags }}
          KUBECONFIG: /opt/devops/.kube/config
        run: |
          IFS=',' read -ra ADDR <<< "$TAGS"
          
          # Mảng mapping: "tên_service_input:tên_chart"
          MAPPING=("backoffice-bff:backoffice-bff" "backoffice:backoffice-ui" "cart:cart" "customer:customer" "inventory:inventory" "media:media" "order:order" "product:product" "search:search" "storefront:storefront-ui" "storefront-bff:storefront-bff" "tax:tax" "swagger-ui:swagger-ui")
          
          echo "🚀 Starting Direct Helm Deployment to sandbox namespace 'yas'..."
          
          for ITEM in "${MAPPING[@]}"; do
            SVC_INPUT="${ITEM%%:*}"
            CHART_NAME="${ITEM#*:}"
            
            # Tìm tag cho service này (mặc định là latest nếu dev không sửa)
            TAG="latest"
            for i in "${ADDR[@]}"; do
              if [[ $i == "$SVC_INPUT="* ]]; then
                TAG="${i#*=}"
              fi
            done
            
           if [ -d "k8s/charts/$CHART_NAME" ]; then
                echo "📦 Deploying $CHART_NAME (yas-$CHART_NAME) with tag: $TAG into namespace 'yas'..."
                
                echo "🔄 Building dependencies for chart $CHART_NAME..."
                helm dependency build k8s/charts/$CHART_NAME
                
                # Override nodePort=null để K8s tự cấp port ngẫu nhiên, tránh xung đột
                if [ "$CHART_NAME" = "storefront-ui" ] || [ "$CHART_NAME" = "backoffice-ui" ]; then
                  helm upgrade --install yas-$CHART_NAME k8s/charts/$CHART_NAME -n yas --create-namespace \
                    --set ui.image.tag=$TAG \
                    --set ui.service.nodePort=null
                elif [ "$CHART_NAME" = "swagger-ui" ]; then
                  helm upgrade --install yas-$CHART_NAME k8s/charts/$CHART_NAME -n yas --create-namespace \
                    --set image.tag=$TAG \
                    --set service.nodePort=null
                else
                  helm upgrade --install yas-$CHART_NAME k8s/charts/$CHART_NAME -n yas --create-namespace \
                    --set backend.image.tag=$TAG \
                    --set backend.service.nodePort=null
                fi
            else
                echo "⚠️ Chart $CHART_NAME not found in k8s/charts/"
            fi
          done
          
          echo "🎉 All services deployed successfully to namespace 'yas'."

      - name: Provide Access Information
        env:
          KUBECONFIG: /opt/devops/.kube/config
        run: |
          echo "=================================================="
          echo "🎉 Sandbox Deployment Completed Successfully!"
          echo "=================================================="
          echo ""
          echo "📋 Add the Worker Node IP to your /etc/hosts file:"
          WORKER_IP=$(kubectl get nodes -l node-role.kubernetes.io/control-plane!= -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "<WORKER_NODE_IP>")
          echo "  $WORKER_IP  storefront.yas.local.com backoffice.yas.local.com api.yas.local.com"
          echo ""
          echo "🌐 Dynamically assigned NodePorts for your sandbox services:"
          echo "---"
          kubectl get svc -n yas --no-headers | awk '{
            split($5, ports, ",");
            for (i in ports) {
              if (match(ports[i], /[0-9]+:([0-9]+)\/TCP/, arr)) {
                printf "  %-30s NodePort: %s\n", $1, arr[1]
              }
            }
          }'
          echo "---"
          echo "=================================================="
