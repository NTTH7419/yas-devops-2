name: developer_build

on:
  workflow_dispatch:
    inputs:
      backoffice:
        description: 'Branch for backoffice'
        required: true
        default: 'main'
      backoffice_bff:
        description: 'Branch for backoffice-bff'
        required: true
        default: 'main'
      cart:
        description: 'Branch for cart'
        required: true
        default: 'main'
      customer:
        description: 'Branch for customer'
        required: true
        default: 'main'
      inventory:
        description: 'Branch for inventory'
        required: true
        default: 'main'
      media:
        description: 'Branch for media'
        required: true
        default: 'main'
      order:
        description: 'Branch for order'
        required: true
        default: 'main'
      product:
        description: 'Branch for product'
        required: true
        default: 'main'
      search:
        description: 'Branch for search'
        required: true
        default: 'main'
      storefront:
        description: 'Branch for storefront'
        required: true
        default: 'main'
      storefront_bff:
        description: 'Branch for storefront-bff'
        required: true
        default: 'main'
      tax:
        description: 'Branch for tax'
        required: true
        default: 'main'
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.build_step.outputs.tags }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Modified Services
        id: build_step
        env:
          INPUTS_JSON: ${{ toJson(github.event.inputs) }}
        run: |
          echo "$INPUTS_JSON" > inputs.json
          
          SERVICES=("backoffice" "backoffice-bff" "cart" "customer" "inventory" "media" "order" "product" "search" "storefront" "storefront-bff" "tax")
          
          # Khởi tạo chuỗi chứa các tag để truyền sang job deploy
          TAGS_OUTPUT=""

          for SVC in "${SERVICES[@]}"; do
            KEY=$(echo $SVC | sed 's/-/_/g')
            BRANCH=$(jq -r ".$KEY" inputs.json)
            
            if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "null" ] && [ "$BRANCH" != "" ]; then
              echo "🚀 Processing service: $SVC on branch: $BRANCH"
              git checkout $BRANCH
              
              COMMIT_ID=$(git rev-parse --short HEAD)
              REPO="${{ secrets.DOCKERHUB_USERNAME }}/yas-$SVC"
              
              if [ -f "$SVC/pom.xml" ]; then
                mvn clean package -DskipTests -pl $SVC -am
              elif [ -f "$SVC/package.json" ]; then
                cd $SVC && npm install && npm run build && cd ..
              fi
              
              docker build -t $REPO:$COMMIT_ID ./$SVC
              docker push $REPO:$COMMIT_ID
              
              TAGS_OUTPUT="${TAGS_OUTPUT}${SVC}=${COMMIT_ID},"
              git checkout main
            fi
          done
          echo "tags=$TAGS_OUTPUT" >> $GITHUB_OUTPUT

  deploy:
    needs: build_and_push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Set up Kubeconfig
      #   run: |
      #     mkdir -p ~/.kube
      #     echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Deploy Services with Helm
        env:
          TAGS: ${{ needs.build_and_push.outputs.tags }}
        run: |
          IFS=',' read -ra ADDR <<< "$TAGS"
          
          # Mảng mapping: "tên_service_input:tên_chart"
          MAPPING=("backoffice:backoffice-ui" "backoffice-bff:backoffice-bff" "cart:cart" "customer:customer" "inventory:inventory" "media:media" "order:order" "product:product" "search:search" "storefront:storefront-ui" "storefront-bff:storefront-bff" "tax:tax" "swagger-ui:swagger-ui")
          
          for ITEM in "${MAPPING[@]}"; do
            SVC_INPUT="${ITEM%%:*}"
            CHART_NAME="${ITEM#*:}"
            
            # Tìm tag cho service này
            TAG="latest"
            for i in "${ADDR[@]}"; do
              if [[ $i == "$SVC_INPUT="* ]]; then
                TAG="${i#*=}"
              fi
            done
            
            echo "🚀 Deploying $CHART_NAME (from $SVC_INPUT) with tag: $TAG"
            
            if [ -d "k8s/charts/$CHART_NAME" ]; then
                REPO="${{ secrets.DOCKERHUB_USERNAME }}/yas-$SVC_INPUT"
                echo "Pulling from repository: $REPO"
                
                helm upgrade --install $CHART_NAME k8s/charts/$CHART_NAME \
                  --namespace yas --create-namespace \
                  --set backend.image.repository=$REPO \
                  --set backend.image.tag=$TAG \
                  --set ui.image.repository=$REPO \
                  --set ui.image.tag=$TAG \
                  --wait --timeout 5m
            else
                echo "⚠️ Chart $CHART_NAME not found in k8s/charts/"
            fi
          done

      - name: Provide Access Information
        run: |
          echo "=================================================="
          echo "🎉 Deployment Completed Successfully!"
          echo "=================================================="
          echo "To test your code, add the Worker Node IP to your /etc/hosts file:"
          echo "<WORKER_NODE_IP> storefront.yas.local.com backoffice.yas.local.com api.yas.local.com"
          echo ""
          echo "Access your services at:"
          echo "- Storefront: http://storefront.yas.local.com:30018"
          echo "- Backoffice: http://backoffice.yas.local.com:30017"
          echo "- Swagger UI: http://api.yas.local.com:30010/swagger-ui.html"
          echo "=================================================="
