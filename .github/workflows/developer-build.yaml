name: developer_build

on:
  workflow_dispatch:
    inputs:
      backoffice:
        description: 'Branch for backoffice'
        required: true
        default: 'main'
      backoffice_bff:
        description: 'Branch for backoffice-bff'
        required: true
        default: 'main'
      cart:
        description: 'Branch for cart'
        required: true
        default: 'main'
      customer:
        description: 'Branch for customer'
        required: true
        default: 'main'
      inventory:
        description: 'Branch for inventory'
        required: true
        default: 'main'
      media:
        description: 'Branch for media'
        required: true
        default: 'main'
      order:
        description: 'Branch for order'
        required: true
        default: 'main'
      product:
        description: 'Branch for product'
        required: true
        default: 'main'
      search:
        description: 'Branch for search'
        required: true
        default: 'main'
      storefront:
        description: 'Branch for storefront'
        required: true
        default: 'main'
      storefront_bff:
        description: 'Branch for storefront-bff'
        required: true
        default: 'main'
      tax:
        description: 'Branch for tax'
        required: true
        default: 'main'

permissions:
  contents: read
  packages: write

jobs:
  prepare_tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.resolve_step.outputs.tags }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Image Tags
        id: resolve_step
        env:
          INPUTS_JSON: ${{ toJson(github.event.inputs) }}
        run: |
          echo "$INPUTS_JSON" > inputs.json
          
          SERVICES=("backoffice" "backoffice-bff" "cart" "customer" "inventory" "media" "order" "product" "search" "storefront" "storefront-bff" "tax")
          
          # Khởi tạo chuỗi chứa các tag để truyền sang job deploy
          TAGS_OUTPUT=""

          for SVC in "${SERVICES[@]}"; do
            KEY=$(echo $SVC | sed 's/-/_/g')
            BRANCH=$(jq -r ".$KEY" inputs.json)
            
            if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "null" ] && [ "$BRANCH" != "" ]; then
              echo "🚀 Resolving commit for service: $SVC on branch: $BRANCH"
              git checkout $BRANCH
              
              # Monorepo: Lấy mã commit của lần cuối cùng mã nguồn service này bị chỉnh sửa (Khớp 100% với CI trigger)
              COMMIT_ID=$(git log -1 --format=%H -- $SVC .github/workflows/actions/action.yaml .github/workflows/${SVC}-ci.yaml pom.xml 2>/dev/null | cut -c1-7)
              
              if [ -z "$COMMIT_ID" ]; then
                echo "❌ No commit found modifying $SVC on branch $BRANCH!"
                exit 1
              fi
              
              echo "✅ Found exact CI commit $COMMIT_ID for $SVC"
              TAGS_OUTPUT="${TAGS_OUTPUT}${SVC}=${COMMIT_ID},"
              git checkout main
            fi
          done
          echo "tags=$TAGS_OUTPUT" >> $GITHUB_OUTPUT

  deploy:
    needs: prepare_tags
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Set up Kubeconfig
      #   run: |
      #     mkdir -p ~/.kube
      #     echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config



      - name: Deploy Services via Direct Helm
        env:
          TAGS: ${{ needs.prepare_tags.outputs.tags }}
          KUBECONFIG: /opt/devops/.kube/config
        run: |
          IFS=',' read -ra ADDR <<< "$TAGS"
          
          # Mảng mapping: "tên_service_input:tên_chart"
          MAPPING=("backoffice-bff:backoffice-bff" "backoffice:backoffice-ui" "cart:cart" "customer:customer" "inventory:inventory" "media:media" "order:order" "product:product" "search:search" "storefront:storefront-ui" "storefront-bff:storefront-bff" "tax:tax" "swagger-ui:swagger-ui" "sampledata:sampledata")
          
          echo "🚀 Starting Direct Helm Deployment to sandbox namespace 'yas'..."
          

          
          # Xóa các Ingress cũ của UI để tránh xung đột domain/path khi cấu hình lại BFF làm gateway chính
          echo "🧹 Cleaning up old UI Ingresses to prevent domain/path conflicts..."
          kubectl delete ingress backoffice-ui storefront-nextjs -n yas --ignore-not-found=true || true
          
          echo "📦 Deploying base configuration chart (yas-configuration)..."
          helm dependency build k8s/charts/yas-configuration
          helm upgrade --install yas-configuration k8s/charts/yas-configuration -n yas --create-namespace
          
          for ITEM in "${MAPPING[@]}"; do
            SVC_INPUT="${ITEM%%:*}"
            CHART_NAME="${ITEM#*:}"
            
            # Tìm tag cho service này (mặc định là latest nếu dev không sửa)
            TAG="latest"
            for i in "${ADDR[@]}"; do
              if [[ $i == "$SVC_INPUT="* ]]; then
                TAG="${i#*=}"
              fi
            done
            
           if [ -d "k8s/charts/$CHART_NAME" ]; then
                echo "📦 Deploying $CHART_NAME (yas-$CHART_NAME) with tag: $TAG into namespace 'yas'..."
                
                echo "🔄 Building dependencies for chart $CHART_NAME..."
                helm dependency build k8s/charts/$CHART_NAME
                
                # Override nodePort=null để K8s tự cấp port ngẫu nhiên, tránh xung đột
                if [ "$CHART_NAME" = "storefront-ui" ] || [ "$CHART_NAME" = "backoffice-ui" ]; then
                  INGRESS_IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.spec.clusterIP}' 2>/dev/null || echo "127.0.0.1")
                  helm upgrade --install yas-$CHART_NAME k8s/charts/$CHART_NAME -n yas --create-namespace \
                    --set ui.image.tag=$TAG \
                    --set ui.service.nodePort=null \
                    --set ui.ingress.enabled=false \
                    --set ui.hostAliases[0].ip=$INGRESS_IP \
                    --set ui.hostAliases[0].hostnames[0]="storefront.yas.local.com" \
                    --set ui.hostAliases[0].hostnames[1]="backoffice.yas.local.com" \
                    --set ui.hostAliases[0].hostnames[2]="api.yas.local.com" \
                    --set ui.hostAliases[0].hostnames[3]="identity.yas.local.com"
                elif [ "$CHART_NAME" = "swagger-ui" ]; then
                  helm upgrade --install yas-$CHART_NAME k8s/charts/$CHART_NAME -n yas --create-namespace \
                    --set image.tag=$TAG \
                    --set service.nodePort=null
                else
                  if [ "$CHART_NAME" != "backoffice-bff" ] && [ "$CHART_NAME" != "storefront-bff" ]; then
                    helm upgrade --install yas-$CHART_NAME k8s/charts/$CHART_NAME -n yas --create-namespace \
                      --set backend.image.tag=$TAG \
                      --set backend.service.nodePort=null \
                      --set backend.ingress.host=api.yas.local.com \
                      --set backend.ingress.path=/$CHART_NAME
                  else
                    if [ "$CHART_NAME" = "storefront-bff" ]; then
                      BFF_HOST="storefront.yas.local.com"
                    else
                      BFF_HOST="backoffice.yas.local.com"
                    fi
                    helm upgrade --install yas-$CHART_NAME k8s/charts/$CHART_NAME -n yas --create-namespace \
                      --set backend.image.tag=$TAG \
                      --set backend.service.nodePort=null \
                      --set backend.ingress.host=$BFF_HOST \
                      --set backend.ingress.path=/
                  fi
                fi
            else
                echo "⚠️ Chart $CHART_NAME not found in k8s/charts/"
            fi
          done
          
          echo "🎉 All services deployed successfully to namespace 'yas'."

      - name: Provide Access Information
        env:
          KUBECONFIG: /opt/devops/.kube/config
        run: |
          # Vô hiệu hóa cơ chế tự động dọn dẹp tiến trình ngầm (Process Orphan Cleanup) của GitHub Actions runner
          export RUNNER_TRACKING_ID=""
          
          # 1. Lấy IP của Worker Node K8s (Minikube hoặc Control-plane/Worker)
          WORKER_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "192.168.49.2")
          
          # 2. Lấy IP Public của VM để hướng dẫn Developer cấu hình /etc/hosts trên máy cá nhân
          PUBLIC_IP=$(curl -s ifconfig.me 2>/dev/null || echo "<IP_PUBLIC_CỦA_VM>")
          
          # 3. Dọn dẹp socat cũ (Chỉ kill các port 3xxxx của NodePort, chừa lại port 80/443 của Ingress)
          pkill -f "socat TCP-LISTEN:3[0-9][0-9][0-9][0-9],.*TCP:$WORKER_IP" || true
          

          PORT_SWAGGER=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}' 2>/dev/null || echo "80")
          if [ -n "$PORT_SWAGGER" ] && [ "$PORT_SWAGGER" != "80" ]; then
            nohup socat TCP-LISTEN:$PORT_SWAGGER,fork,bind=0.0.0.0 TCP:$WORKER_IP:$PORT_SWAGGER >/dev/null 2>&1 &
          fi
          
          echo ""
          echo "================================================================="
          echo "🎉 SANDBOX DEPLOYMENT COMPLETED SUCCESSFULLY!"
          echo "================================================================="
          echo ""
          echo "📋 BƯỚC 1: Đảm bảo file hosts có các domain sau:"
          echo "  $PUBLIC_IP  storefront.yas.local.com backoffice.yas.local.com api.yas.local.com"
          echo ""
          INGRESS_NODE_PORT=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}' 2>/dev/null || echo "80")
          
          echo "🌐 BƯỚC 2: Truy cập GIAO DIỆN (UI) theo yêu cầu (domain:nodeport):"
          echo "-----------------------------------------------------------------"
          echo "  🛒 Storefront (UI) : http://storefront.yas.local.com:$INGRESS_NODE_PORT"
          echo "  ⚙️  Backoffice (UI) : http://backoffice.yas.local.com:$INGRESS_NODE_PORT"
          echo "  📖 Swagger API     : http://api.yas.local.com:$INGRESS_NODE_PORT/swagger-ui"
          echo ""
          echo "================================================================="
          echo ""
          echo "================================================================="
          echo "✅ Done! Happy testing! 🚀"
          echo ""
