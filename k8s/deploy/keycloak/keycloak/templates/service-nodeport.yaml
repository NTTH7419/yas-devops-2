apiVersion: v1
kind: Service
metadata:
  name: keycloak-nodeport
  namespace: keycloak
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30000
      name: http
  selector:
    app: keycloak
    app.kubernetes.io/instance: keycloak
    app.kubernetes.io/name: keycloak
