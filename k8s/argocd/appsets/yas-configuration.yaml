apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-configuration
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            selfHeal: false
          - env: staging
            selfHeal: true
  template:
    metadata:
      name: "yas-configuration-{{env}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/NTTH7419/yas-devops-2
        targetRevision: main
        path: "k8s/charts/yas-configuration"
        helm:
          valueFiles:
            - "../../envs/{{env}}/values-common.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "yas-{{env}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: {{selfHeal}}
        syncOptions:
          - CreateNamespace=true
