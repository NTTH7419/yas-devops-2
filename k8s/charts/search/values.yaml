backend:
  image:
    repository: ngoctuan74/yas-search
    tag: latest

  nameOverride: search
  fullnameOverride: search
  databaseName: search
  service:
    type: NodePort
    nodePort: 30016
  ingress:
    enabled: true
  host: search.yas.local.com
  extraEnvFroms:
    - secretRef:
        name: yas-elasticsearch-credentials-secret
  extraVolumes:
    - name: search-application
      configMap:
        name: search-application-configmap
  extraVolumeMounts:
    - name: search-application
      mountPath: /opt/yas/search
  extraApplicationConfigPaths:
    - /opt/yas/search/search-application.yaml
