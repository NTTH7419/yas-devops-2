ui:
  image:
    repository: ghcr.io/ntth7419/yas-storefront
    tag: latest
  nameOverride: storefront-nextjs
  fullnameOverride: storefront-nextjs
  extraVolumes:
    - name: storefront-env-production
      configMap:
        name: storefront-env-production-configmap
        items:
          - key: .env.production
            path: .env.production
  extraVolumeMounts:
    - name: storefront-env-production
      mountPath: /app/.env.production
      readOnly: true
      subPath: .env.production
  extraEnvs:
    - name: API_BASE_PATH
      value: http://storefront.yas.local.com:80/api
  service:
    type: NodePort
  ingress:
    enabled: false
    host: storefront.yas.local.com
  hostAliases:
    - ip: "10.107.225.193"
      hostnames:
        - "storefront.yas.local.com"

storefrontEnvProduction: |
  API_BASE_PATH=http://storefront.yas.local.com:80/api