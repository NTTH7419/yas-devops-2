backend:
  image:
    repository: ngoctuan74/yas-cart
    tag: latest

  nameOverride: cart
  fullnameOverride: cart
  databaseName: cart
  service:
    type: NodePort
    nodePort: 30004
  ingress:
    enabled: false
  extraVolumes:
    - name: cart-application-config
      configMap:
        name: cart-application-configmap
  extraVolumeMounts:
    - name: cart-application-config
      mountPath: /opt/yas/cart
  extraApplicationConfigPaths:
    - /opt/yas/cart/cart-application.yaml
