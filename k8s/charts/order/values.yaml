backend:
  image:
    repository: ngoctuan74/yas-order
    tag: latest

  nameOverride: order
  fullnameOverride: order
  databaseName: order
  service:
    type: NodePort
    nodePort: 30009
  ingress:
    enabled: true
    host: order.yas.local.com
  extraVolumes:
    - name: order-application-config
      configMap:
        name: order-application-configmap
  extraVolumeMounts:
    - name: order-application-config
      mountPath: /opt/yas/order
  extraApplicationConfigPaths:
    - /opt/yas/order/order-application.yaml  