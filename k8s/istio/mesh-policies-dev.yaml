# 1. Bật mTLS STRICT cho toàn bộ namespace yas-dev
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: dev
spec:
  mtls:
    mode: PERMISSIVE

---
# 2. Cấu hình Retry Policy cho tax-service
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: tax-retry
  namespace: dev
spec:
  hosts:
  - tax
  http:
  - route:
    - destination:
        host: tax
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx,connect-failure,refused-stream

---
# 3. Cấu hình Authorization Policy cho search-service
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: search-policy
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: search
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/dev/sa/product"] # Ví dụ: Chỉ product-service mới được gọi search

