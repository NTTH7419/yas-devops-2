# 1. Bật mTLS STRICT cho toàn bộ namespace yas-staging
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: yas-staging
spec:
  mtls:
    mode: STRICT

---
# 2. Cấu hình Retry Policy cho tax-service
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: tax-retry
  namespace: yas-staging
spec:
  hosts:
  - tax
  http:
  - route:
    - destination:
        host: tax
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx,connect-failure,refused-stream

---
# 3. Cấu hình Authorization Policy cho search-service
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: search-policy
  namespace: yas-staging
spec:
  selector:
    matchLabels:
      app: search
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/yas-staging/sa/product"] # Ví dụ: Chỉ product-service mới được gọi search
